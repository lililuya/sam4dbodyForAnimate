paths:
  ckpt_root: "path to global checkpoint root"

sam3:
  ckpt_path: ${paths.ckpt_root}/sam3/sam3.pt

sam_3d_body:
  ckpt_path: ${paths.ckpt_root}/sam-3d-body-dinov3/model.ckpt
  mhr_path: ${paths.ckpt_root}/sam-3d-body-dinov3/assets/mhr_model.pt
  fov_path: ${paths.ckpt_root}/moge-2-vitl-normal/model.pt
  batch_size: 32
  detector_path: ""
  segmentor_path: ""

runtime:
  output_dir: ./outputs_refined
  continue_on_error: false
  # Pose json exports written per-frame and per-person.
  # Supported: openpose, smpl, coco17, coco_wholebody
  pose_exports: [openpose, smpl, coco17, coco_wholebody]
  # Keep the final 4D mp4 even if per-frame rendered JPGs are disabled.
  save_rendered_video: true
  # Direct inline mp4 writing forces per-frame rendering in the main loop, so keep it off unless needed.
  save_rendered_video_direct: false
  # Optional 4D artifacts. Turn off the ones you do not need to reduce IO and disk usage.
  save_rendered_frames: true
  save_rendered_frames_individual: true
  save_mesh_4d_individual: true
  save_focal_4d_individual: true

wan_export:
  enable: false
  metadata_output_dir: ""
  fps: 25
  resolution_area: [512, 768]
  face_resolution: [512, 512]
  min_track_frames: 16
  min_valid_face_ratio: 0.60
  face_expand: 1.30
  face_gap: 8
  skip_sample_without_face: true
  face_presence_stride: 5
  max_no_face_ratio: 0.80
  copy_rendered_4d_to_targets: true
  cleanup_sample_workdir_after_export: true
  mask_kernel_size: 7
  mask_iterations: 3
  mask_w_len: 10
  mask_h_len: 20
  save_pose_meta_json: true
  save_smpl_sequence_json: false

completion:
  enable: true
  detection_resolution: [256, 512]
  completion_resolution: [512, 1024]
  model_path_mask: ${paths.ckpt_root}/diffusion-vas-amodal-segmentation
  model_path_rgb: ${paths.ckpt_root}/diffusion-vas-content-completion
  model_path_depth: ${paths.ckpt_root}/depth_anything_v2_vitl.pth
  depth_encoder: vitl
  max_occ_len: 25

detector:
  backend: yolo
  # For YOLO, weights_path can be a local .pt file or a model name like yolo11m.pt.
  # Leave it empty to auto-download the default yolo11n.pt on first use.
  weights_path: ""
  # Leave these as null to use official backend defaults:
  # yolo/yolo11 -> bbox_thresh 0.25, iou_thresh 0.70, max_det 300
  # vitdet -> bbox_thresh 0.05, iou_thresh 0.50
  bbox_thresh: null
  iou_thresh: null
  max_det: null
  max_targets: 0

tracking:
  chunk_size: 180

refine:
  enable: true

batch:
  initial_search_frames: 24
  retry_mode: quality_safe
  retry_chunk_sizes: [120, 96]
  retry_batch_sizes: [24, 16]

reprompt:
  enable: true
  empty_mask_patience: 3
  area_drop_ratio: 0.35
  edge_touch_ratio: 0.40
  iou_low_threshold: 0.55

debug:
  save_metrics: true
