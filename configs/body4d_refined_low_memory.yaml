paths:
  # Global checkpoint root. All model paths below resolve from this directory.
  ckpt_root: "path to global checkpoint root"

sam3:
  ckpt_path: ${paths.ckpt_root}/sam3/sam3.pt

sam_3d_body:
  # Core SAM-3D-Body checkpoints.
  ckpt_path: ${paths.ckpt_root}/sam-3d-body-dinov3/model.ckpt
  mhr_path: ${paths.ckpt_root}/sam-3d-body-dinov3/assets/mhr_model.pt
  fov_path: ${paths.ckpt_root}/moge-2-vitl-normal/model.pt
  # Conservative low-memory setting for the 3D body stage.
  batch_size: 16
  detector_path: ""
  segmentor_path: ""

runtime:
  # Refined outputs will be written under this directory.
  output_dir: ./outputs_refined
  continue_on_error: false
  # Pose json exports written per-frame and per-person.
  # Supported: openpose, smpl, coco17, coco_wholebody
  pose_exports: [openpose, smpl, coco17, coco_wholebody]
  # Optional 4D artifacts. Disable any of these to reduce disk usage and write amplification.
  save_rendered_frames: true
  save_rendered_frames_individual: true
  save_mesh_4d_individual: true
  save_focal_4d_individual: true

completion:
  # Keep completion enabled, but use a small temporal footprint for VRAM safety.
  enable: true
  # Low-resolution working sizes for amodal detection and completion.
  detection_resolution: [192, 384]
  completion_resolution: [256, 512]
  # These are the strongest low-memory throttles in this profile.
  # completion.batch_size = 1 keeps the 4D loop to one completion sample at a time.
  # decode_chunk_size = 1 keeps diffusion decoding frame-by-frame.
  batch_size: 1
  decode_chunk_size: 1
  model_path_mask: ${paths.ckpt_root}/diffusion-vas-amodal-segmentation
  model_path_rgb: ${paths.ckpt_root}/diffusion-vas-content-completion
  model_path_depth: ${paths.ckpt_root}/depth_anything_v2_vitl.pth
  depth_encoder: vitl
  # Maximum temporal length of a single completion window.
  # Smaller values reduce peak VRAM but may truncate long occlusions.
  max_occ_len: 8

detector:
  backend: yolo
  # For YOLO, weights_path can be a local .pt file or a model name like yolo11m.pt.
  # Leave it empty to auto-download the default yolo11n.pt on first use.
  weights_path: ""
  # Tuned for close and overlapping people:
  # lower bbox threshold keeps partially occluded people,
  # while capped max_det avoids exploding false positives in crowded frames.
  bbox_thresh: 0.20
  iou_thresh: 0.70
  max_det: 20
  # 0 means "do not cap tracked people after detection ranking".
  # If your scene has a known fixed person count, lowering this can speed up 4D.
  max_targets: 0

tracking:
  # Number of frames grouped together for refined mask processing bookkeeping.
  chunk_size: 180

refine:
  # Refined mask post-processing:
  # - keep largest connected component per person
  # - optionally fall back to the previous mask when the current one is empty
  enable: true

batch:
  # Search this many early frames and pick the frame with the strongest detections.
  initial_search_frames: 24
  # Quality-safe retries trade time for robustness. Set to "never" for speed priority.
  retry_mode: quality_safe
  # Retry schedule used when a sample fails:
  # - chunk size is reduced first
  # - then 3D batch size is reduced
  retry_chunk_sizes: [120, 96]
  retry_batch_sizes: [16, 8]

reprompt:
  # Current implementation is diagnostic-only:
  # it logs suspicious tracking states, but does not yet re-run prompts automatically.
  enable: true
  # Trigger after this many consecutive empty masks for one person.
  empty_mask_patience: 5
  # Trigger when current mask area drops below this ratio of the previous area.
  area_drop_ratio: 0.20
  # Trigger when too much foreground touches the image border.
  edge_touch_ratio: 0.40
  # Trigger when mask IoU against the previous frame falls below this threshold.
  iou_low_threshold: 0.35

debug:
  # Keep debug artifacts so failed samples can be inspected and completed ones can be skipped.
  save_metrics: true
